
name: release

on:
  release:
    types: [created]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    environment: automated-release

    env: 
      GH_TOKEN: ${{secrets.GITHUB_TOKEN}}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Move release to draft
        run: gh release edit "$TAG_NAME" --draft=true
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Create lib archive
        run: |
          zip -r lib.zip lib *.md LICENSE SECURITY.md package.json package-lock.json -x 'lib/test/*' 'lib/src/*'

      - name: Upload production artifacts
        run: |
          gh release upload $TAG_NAME "lib.zip"
          gh release edit $TAG_NAME --draft=false
        env:
          TAG_NAME: ${{ github.event.release.tag_name }}